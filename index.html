<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>When the Referee Is Also a Player</title>

  <!-- Optional Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --slate: #2f4b61;
      --deep-slate: #203647;
      --light-blue: #b2cde3;
      --light-gray-blue: #eaeef1;
      --map-neutral: #d7dee4;
      --brick: #882110;
      --gold: #c6a25a;
      --sage: #6e8b74;
      --page: #ffffff;
      --text: #172033;
      --muted: #4d5b70;
      --soft-blue-bg: #f5f9fc;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      background: var(--page);
      color: var(--text);
      font-family: "Source Sans 3", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.55;
    }

    .page {
      width: 100%;
      background: var(--page);
    }

    .section {
      padding: 58px 6vw 46px;
    }

    .inner {
      max-width: 1280px;
      margin: 0 auto;
    }

    .hero {
      background: var(--page);
      color: var(--text);
      text-align: center;
      padding-top: 72px;
      padding-bottom: 32px;
    }

    .hero-title {
      font-family: "Public Sans", system-ui, sans-serif;
      font-size: clamp(2.8rem, 5.5vw, 5.5rem);
      line-height: 1.02;
      letter-spacing: -0.035em;
      font-weight: 600;
      margin: 0 auto 16px;
      max-width: 1180px;
      color: var(--slate);
      text-transform: none;
    }

    .hero-subhead {
      font-size: clamp(1.25rem, 2vw, 1.6rem);
      max-width: 950px;
      color: var(--muted);
      margin: 0 auto;
      text-transform: none;
    }

    .hero-map {
      margin-top: 42px;
      width: 100%;
    }

    .stat-highlight {
      background: linear-gradient(transparent 55%, rgba(198,162,90,.45) 55%);
      font-weight: 700;
    }

    .flourish-embed-iframe {
      width: 100%;
      height: 600px;
      border: 0;
      display: block;
    }

    @media (max-width: 700px) {
      .section {
        padding: 42px 5vw 34px;
      }

      .hero-map {
        margin-top: 32px;
      }

      .flourish-embed-iframe {
        height: 480px;
      }
    }
  </style>
</head>

<body>
  <main class="page">

    <section class="section hero">
      <div class="inner">

        <h1 class="hero-title">
          When the Referee Is Also a Player
        </h1>

        <p class="hero-subhead">
          In 2026, <span class="stat-highlight">26 Secretaries of State</span> are running for office while overseeing elections.<br>
          Explore where this is happening — and why it matters.
        </p>

        <div class="hero-map">
          <iframe
            src="https://flo.uri.sh/visualisation/29426086/embed"
            title="Interactive map showing secretaries of state running for office in 2026"
            class="flourish-embed-iframe"
            scrolling="no"
            sandbox="allow-same-origin allow-forms allow-scripts allow-downloads allow-popups allow-popups-to-escape-sandbox allow-top-navigation-by-user-activation">
          </iframe>
        </div>

      </div>
    </section>

  </main>
</body>
</html>
